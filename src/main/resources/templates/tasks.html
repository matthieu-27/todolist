<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout"
>
  <head>
    <title>Article List</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div
        class="modal fade"
        id="exampleModalToggle"
        aria-hidden="true"
        aria-labelledby="exampleModalToggleLabel"
        tabindex="-1"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalToggleLabel">
                Create Task
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form
                th:action="@{/create-task}"
                th:object="${task}"
                method="post"
                class="needs-validation"
              >
                <div class="form-group">
                  <label for="title" class="form-label">Title:</label>
                  <input
                    id="title"
                    type="text"
                    th:field="*{title}"
                    class="form-control"
                  />
                </div>
                <div class="form-group">
                  <label for="description" class="form-label"
                    >Description:</label
                  >
                  <input
                    id="description"
                    type="text"
                    th:field="*{description}"
                    class="form-control"
                  />
                </div>
                <div class="form-group">
                  <label for="status" class="form-label">status:</label>
                  <select
                    id="status"
                    class="form-select"
                    aria-label="Select a status"
                  >
                    <option
                      th:each="taskStatus, status : ${status}"
                      th:text="${taskStatus}"
                      th:value="${status.count}"
                    />
                  </select>
                </div>
                <div class="form-group">
                  <label for="scheduledAt" class="form-label"
                    >Scheduled at:</label
                  >
                  <input
                    type="date"
                    class="form-control"
                    id="scheduledAt"
                    name="scheduledAt"
                  />
                </div>
                <div class="form-group">
                  <label for="category" class="form-label">Category:</label>
                  <select
                    id="category"
                    class="form-select"
                    aria-label="Select a category"
                    th:if="${categories.size() > 0}"
                  >
                    <option
                      th:each="category, status : ${categories}"
                      th:text="${category.name}"
                      th:value="${status.count}"
                    />
                  </select>
                </div>
                <ul th:each="error : ${errors}">
                  <li th:text="${error}"></li>
                </ul>
                <button type="submit" class="btn btn-primary mt-2">Save</button>
                <a href="/" class="btn btn-secondary mt-2">Annuler</a>
              </form>
            </div>
            <div class="modal-footer">
              <button
                class="btn btn-primary"
                data-bs-target="#exampleModalToggle2"
                data-bs-toggle="modal"
              >
                Create category
              </button>
            </div>
          </div>
        </div>
      </div>
      <div
        class="modal fade"
        id="exampleModalToggle2"
        aria-hidden="true"
        aria-labelledby="exampleModalToggleLabel2"
        tabindex="-1"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalToggleLabel2">
                Create category
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <form action="">
                <div class="mb-3">
                  <label for="exampleFormControlInput1" class="form-label"
                    >Nom de la catégorie :</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="exampleFormControlInput1"
                    placeholder="Cuisine"
                  />
                </div>
                <div>
                  <button class="btn btn-primary">Sauvegarder</button>
                  <button class="btn btn-outline-dark">Annuler</button>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button
                class="btn btn-primary"
                data-bs-target="#exampleModalToggle"
                data-bs-toggle="modal"
              >
                Return to task
              </button>
            </div>
          </div>
        </div>
      </div>
      <button
        class="btn btn-primary"
        data-bs-target="#exampleModalToggle"
        data-bs-toggle="modal"
      >
        Create task
      </button>
      <div class="text-center">
        <div class="row row-cols-3 gy-2">
          <div class="col">
            <div class="card">
              <div class="card-body">TODO</div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body">DOING</div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body">Done</div>
            </div>
          </div>
          <div class="col" th:each="todoTask : ${todo}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${todoTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${todoTask.title}" />
                <p class="card-text" th:text="${todoTask.description}" />
              </div>
            </div>
          </div>
          <div class="col" th:each="doingTask : ${doing}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${doingTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${doingTask.title}" />
                <p class="card-text" th:text="${doingTask.description}" />
              </div>
            </div>
          </div>
          <div class="col" th:each="doneTask : ${done}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${doneTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${doneTask.title}" />
                <p class="card-text" th:text="${doneTask.description}" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
