<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="layout"
>
  <head>
    <title>Article List</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="text-center">
        <div class="row row-cols-3 gy-2">
          <div class="col">
            <div class="card">
              <div class="card-body">TODO</div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body">DOING</div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <div class="card-body">Done</div>
            </div>
          </div>
          <div class="col" th:each="todoTask : ${todo}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${todoTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${todoTask.title}" />
                <p class="card-text" th:text="${todoTask.description}" />
                <a
                  th:href="@{/delete-task/{id}(id=${todoTask.id})}"
                  class="btn btn-primary"
                >
                  Supprimer
                </a>
                <a
                  th:href="@{/edit-task/{id}(id=${todoTask.id})}"
                  class="btn btn-primary"
                >
                  Modifier
                </a>
              </div>
            </div>
          </div>
          <div class="col" th:each="doingTask : ${doing}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${doingTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${doingTask.title}" />
                <p class="card-text" th:text="${doingTask.description}" />
                <a
                  th:href="@{/delete-task/{id}(id=${doingTask.id})}"
                  class="btn btn-primary"
                >
                  Supprimer
                </a>
                <a
                  th:href="@{/edit-task/{id}(id=${doingTask.id})}"
                  class="btn btn-primary"
                >
                  Modifier
                </a>
              </div>
            </div>
          </div>
          <div class="col" th:each="doneTask, status : ${done}">
            <div class="card text-bg-primary mb-3">
              <div
                class="card-header"
                th:text="${doneTask.getCategory().getName()}"
              />
              <div class="card-body">
                <h5 class="card-title" th:text="${doneTask.title}" />
                <p class="card-text" th:text="${doneTask.description}" />
                <a
                  th:href="@{/delete-task/{id}(id=${doneTask.id})}"
                  class="btn btn-primary"
                >
                  Supprimer
                </a>
                <a
                  th:href="@{/edit-task/{id}(id=${doneTask.id})}"
                  class="btn btn-primary"
                >
                  Modifier
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
